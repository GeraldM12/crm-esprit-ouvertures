<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CRM Esprit">
  <meta name="theme-color" content="#1D9E75">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>CRM â Esprit d'Ouvertures</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;--green-text:#0F6E56;
      --amber-light:#FAEEDA;--amber-text:#633806;--blue-light:#E6F1FB;--blue-text:#0C447C;
      --red:#E24B4A;--gray-light:#F1EFE8;--gray-text:#444441;
      --bg:#f4f4f0;--bg-card:#ffffff;--bg-surf:#ebebE6;
      --text:#1a1a18;--text-m:#6b6b67;--text-h:#9a9a96;
      --bdr:rgba(0,0,0,0.1);--bdr-md:rgba(0,0,0,0.18);
      --r:10px;--rl:14px;--safe-b:env(safe-area-inset-bottom,0px);
    }
    @media(prefers-color-scheme:dark){:root{
      --bg:#1a1a18;--bg-card:#252523;--bg-surf:#2a2a28;
      --text:#f0f0eb;--text-m:#9a9a96;--text-h:#6b6b67;
      --bdr:rgba(255,255,255,0.1);--bdr-md:rgba(255,255,255,0.18);
      --green-light:#0a3d2e;--green-text:#5DCAA5;
      --amber-light:#3d2800;--amber-text:#FAC775;
      --blue-light:#0a2540;--blue-text:#85B7EB;
      --gray-light:#2c2c2a;--gray-text:#B4B2A9;
    }}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;overscroll-behavior:none}
    .app{display:flex;flex-direction:column;height:100dvh}
    .topbar{background:var(--bg-card);border-bottom:0.5px solid var(--bdr);padding:10px 14px;padding-top:max(10px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;flex-shrink:0;flex-wrap:wrap;gap:6px}
    .logo{font-size:14px;font-weight:700}.logo span{color:var(--green)}
    .nav{display:flex;gap:3px;flex-wrap:wrap}
    .nav button{padding:5px 10px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:11px;color:var(--text-m);font-family:inherit}
    .nav button.active{background:var(--bg-surf);color:var(--text);font-weight:600}
    .nav button:hover:not(.active){background:var(--bg-surf)}
    .nav button.scan-btn{background:var(--green);color:#fff;font-weight:600;display:flex;align-items:center;gap:4px}
    .nav button.scan-btn:hover{background:var(--green-dark)}
    .content{flex:1;overflow-y:auto;padding:12px;background:var(--bg);-webkit-overflow-scrolling:touch;padding-bottom:20px}
    .btn{padding:6px 12px;border-radius:9px;border:none;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;display:inline-flex;align-items:center;gap:5px}
    .btn-g{background:var(--green);color:#fff}.btn-g:hover{background:var(--green-dark)}
    .btn-o{background:transparent;border:0.5px solid var(--bdr-md);color:var(--text)}.btn-o:hover{background:var(--bg-surf)}
    .btn-sm{padding:4px 9px;font-size:11px}.btn-r{background:var(--red);color:#fff}
    .card{background:var(--bg-card);border:0.5px solid var(--bdr);border-radius:var(--rl);padding:12px}
    .badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
    .bp{background:var(--green-light);color:var(--green-text)}.br{background:var(--amber-light);color:var(--amber-text)}
    .bd{background:var(--blue-light);color:var(--blue-text)}.bs{background:#EAF3DE;color:#27500A}.bl{background:var(--gray-light);color:var(--gray-text)}
    .r1b{background:var(--blue-light);color:var(--blue-text)}.r2b{background:var(--amber-light);color:var(--amber-text)}
    .tag{font-size:10px;color:var(--text-m);background:var(--bg-surf);padding:2px 6px;border-radius:20px}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px}
    .stat{background:var(--bg-surf);border-radius:8px;padding:10px 11px}
    .stat-l{font-size:10px;color:var(--text-m);margin-bottom:3px}.stat-v{font-size:19px;font-weight:700}
    .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .st{font-size:13px;font-weight:600}
    .two{display:grid;grid-template-columns:1fr 1.65fr;gap:10px}
    @media(max-width:600px){.two{grid-template-columns:1fr}}
    .clist{display:flex;flex-direction:column;gap:6px;max-height:520px;overflow-y:auto}
    .cc{background:var(--bg-card);border:0.5px solid var(--bdr);border-radius:var(--rl);padding:10px 11px;cursor:pointer}
    .cc:hover{border-color:var(--bdr-md)}.cc.sel{border-color:var(--green);border-width:1.5px}
    .av{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
    .ag{background:var(--green-light);color:var(--green-text)}.aa{background:var(--amber-light);color:var(--amber-text)}
    .ab{background:var(--blue-light);color:var(--blue-text)}.ac{background:#FAECE7;color:#712B13}.ax{background:var(--gray-light);color:var(--gray-text)}
    .ci{flex:1;min-width:0}
    .cn{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ca{font-size:11px;color:var(--text-m);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cm{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;align-items:center}
    .sb{width:100%;font-family:inherit;font-size:12px;padding:7px 10px;border-radius:8px;border:0.5px solid var(--bdr-md);background:var(--bg-card);color:var(--text);margin-bottom:7px}
    .sb:focus{outline:none;border-color:var(--green)}
    .frow{display:flex;gap:5px;margin-bottom:7px;flex-wrap:wrap}
    .fb{padding:4px 9px;border-radius:20px;border:0.5px solid var(--bdr);background:transparent;font-size:11px;cursor:pointer;font-family:inherit;color:var(--text-m)}
    .fb.active{background:var(--green);color:#fff;border-color:var(--green)}
    .df{margin-bottom:9px}
    .df label{font-size:10px;color:var(--text-m);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
    .df .v{font-size:12px}
    .sel-s{width:100%;font-family:inherit;font-size:12px;padding:5px 8px;border-radius:8px;border:0.5px solid var(--bdr-md);background:var(--bg-card);color:var(--text)}
    .ta{width:100%;font-family:inherit;font-size:12px;padding:7px 8px;border-radius:8px;border:0.5px solid var(--bdr-md);background:var(--bg-card);color:var(--text);resize:vertical;min-height:65px;line-height:1.5}
    .ta:focus,.sel-s:focus{outline:none;border-color:var(--green)}
    .hlist{display:flex;flex-direction:column;gap:4px;max-height:110px;overflow-y:auto}
    .hi{font-size:11px;padding:6px 8px;border-radius:7px;background:var(--bg-surf)}
    .hd{color:var(--text-m);font-size:10px;margin-bottom:1px}
    .rdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .du{background:var(--red)}.dt{background:#EF9F27}.ds{background:var(--green)}
    .rem-item{background:var(--bg-card);border:0.5px solid var(--bdr);border-radius:var(--rl);padding:9px 11px;display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:5px}
    .pipe{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
    .pc{min-width:120px;flex-shrink:0}
    .ph{font-size:11px;font-weight:600;padding:5px 7px;border-radius:7px;margin-bottom:5px;text-align:center}
    .pcard{background:var(--bg-card);border:0.5px solid var(--bdr);border-radius:7px;padding:6px 8px;margin-bottom:4px;font-size:11px;cursor:pointer}
    .pcard:hover{border-color:var(--bdr-md)}
    .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px}
    .photo-thumb{width:100%;aspect-ratio:1;border-radius:8px;object-fit:cover;border:0.5px solid var(--bdr);cursor:pointer}
    .photo-add{width:100%;aspect-ratio:1;border-radius:8px;border:1px dashed var(--bdr-md);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--bg-surf);color:var(--text-m);font-size:10px;gap:3px}
    .photo-add:hover{border-color:var(--green);color:var(--green)}
    .call-item{background:var(--bg-surf);border-radius:8px;padding:7px 9px;display:flex;align-items:center;gap:8px;margin-bottom:4px}
    .ci-i{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .ci-green{background:var(--green-light)}.ci-amber{background:var(--amber-light)}.ci-gray{background:var(--gray-light)}
    .rdv-block,.debrief-block{background:var(--bg-surf);border-radius:8px;padding:8px 10px;margin-bottom:7px}
    .debrief-import{border:1.5px dashed var(--bdr-md);border-radius:8px;padding:10px;text-align:center;cursor:pointer}
    .debrief-import:hover{border-color:var(--green)}
    .qty-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--bdr)}
    .qty-row:last-child{border-bottom:none}
    .qty-btn{width:22px;height:22px;border-radius:50%;border:0.5px solid var(--bdr-md);background:transparent;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text);line-height:1}
    .qty-val{font-size:13px;font-weight:600;min-width:18px;text-align:center}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto}
    .modal-overlay.open{display:flex}
    .modal{background:var(--bg-card);border-radius:var(--rl);padding:16px;width:min(440px,94vw);max-height:85vh;overflow-y:auto;border:0.5px solid var(--bdr-md);margin-bottom:20px}
    .mt{font-size:14px;font-weight:700;margin-bottom:13px}
    .ff{margin-bottom:10px}
    .ff label{font-size:11px;color:var(--text-m);display:block;margin-bottom:3px}
    .ff input,.ff select,.ff textarea{width:100%;font-family:inherit;font-size:12px;padding:7px 9px;border-radius:8px;border:0.5px solid var(--bdr-md);background:var(--bg-card);color:var(--text)}
    .ff input:focus,.ff select:focus,.ff textarea:focus{outline:none;border-color:var(--green)}
    .ma{display:flex;gap:7px;justify-content:flex-end;margin-top:13px}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .cg{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
    .cl{display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;background:var(--bg-surf);padding:3px 8px;border-radius:20px;border:0.5px solid var(--bdr)}
    .cl input{width:auto;padding:0;margin:0}
    .scan-zone{border:2px dashed var(--bdr-md);border-radius:16px;padding:28px 20px;text-align:center;cursor:pointer;margin-bottom:12px}
    .scan-zone:hover{border-color:var(--green);background:var(--bg-surf)}
    .scan-icon{width:48px;height:48px;border-radius:12px;background:var(--green-light);display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
    .ai-status{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:12px;font-weight:500;margin-bottom:10px}
    .ai-think{background:var(--blue-light);color:var(--blue-text)}
    .ai-ok{background:var(--green-light);color:var(--green-text)}
    .ai-err{background:#FCEBEB;color:#791F1F}
    .pulse{width:8px;height:8px;border-radius:50%;background:currentColor;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .field-row{display:flex;flex-direction:column;gap:3px;margin-bottom:9px}
    .field-row label{font-size:10px;color:var(--text-m);text-transform:uppercase;letter-spacing:.04em}
    .field-row input{width:100%;font-family:inherit;font-size:13px;padding:8px 10px;border-radius:8px;border:0.5px solid var(--bdr-md);background:var(--bg-card);color:var(--text)}
    .field-row input:focus{outline:none;border-color:var(--green)}
    .field-row input.pre{border-color:var(--green)}
    .confidence{font-size:10px;padding:2px 7px;border-radius:20px;display:inline-block;margin-top:2px;font-weight:500}
    .conf-h{background:var(--green-light);color:var(--green-text)}.conf-l{background:var(--amber-light);color:var(--amber-text)}
    .prev-img{width:100%;max-height:160px;object-fit:contain;border-radius:10px;border:0.5px solid var(--bdr);margin-bottom:10px}
    .steps{display:flex;gap:0;margin-bottom:16px}
    .step{flex:1;text-align:center;font-size:11px;font-weight:500;padding:7px 4px;color:var(--text-h);border-bottom:2px solid var(--bdr)}
    .step.active{color:var(--green);border-bottom-color:var(--green)}
    .step.done{color:var(--text-m);border-bottom-color:var(--green)}
    .photo-viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center}
    .photo-viewer.open{display:flex}
    .photo-viewer img{max-width:92vw;max-height:90vh;border-radius:8px}
    .toast{position:fixed;bottom:calc(20px + var(--safe-b));left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:300}
    .toast.show{opacity:1}
  </style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div class="logo">Esprit <span>d'Ouvertures</span></div>
    <div class="nav">
      <button class="active" onclick="showTab('dashboard')">Tableau de bord</button>
      <button onclick="showTab('clients')">Clients</button>
      <button onclick="showTab('prospection')">Prospection</button>
      <button onclick="showTab('relances')">Relances</button>
      <button onclick="showTab('export')">Export</button>
      <button class="scan-btn" onclick="showTab('scanner')">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="1" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="8" y="1" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="8" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.3"/><path d="M8 8h1.5v1.5H8zM10.5 8H12M8 10.5v1.5M10.5 10.5H12v1.5h-1.5z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Scanner
      </button>
    </div>
  </div>
  <div class="content" id="content"></div>
  <div id="modal-overlay" class="modal-overlay" onclick="closeModalOut(event)"><div class="modal" id="modal-inner"></div></div>
  <div id="photo-viewer" class="photo-viewer" onclick="this.classList.remove('open')"><img id="pv-img" src="" alt=""></div>
  <div id="toast" class="toast"></div>
</div>
<script src="app.js?v=2"></script>
</body>
</html>
