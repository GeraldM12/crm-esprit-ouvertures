<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e8a838" />
  <meta name="description" content="CRM Esprit d'Ouvertures" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Esprit d'Ouvertures — CRM</title>
  <style>
    /* ===== VARIABLES ===== */
    :root {
      --gold: #e8a838;
      --gold-light: #f5c76a;
      --gold-dark: #c8881a;
      --navy: #1a1a2e;
      --navy-mid: #16213e;
      --navy-light: #0f3460;
      --surface: #1e2a45;
      --surface2: #253350;
      --text: #e8edf5;
      --text-muted: #8fa3c0;
      --red: #e85555;
      --green: #38c57e;
      --blue: #4a9eff;
      --orange: #ff8c42;
      --purple: #a855f7;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
      --transition: 0.2s ease;
    }

    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--navy); color: var(--text); overflow: hidden; }

    /* ===== LAYOUT ===== */
    #app { display: flex; height: 100vh; }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 72px;
      background: var(--navy-mid);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 4px;
      border-right: 1px solid rgba(232,168,56,0.15);
      z-index: 100;
      flex-shrink: 0;
    }
    .sidebar-logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 22px;
      box-shadow: 0 4px 16px rgba(232,168,56,0.35);
    }
    .nav-btn {
      width: 48px;
      height: 48px;
      border: none;
      background: transparent;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--text-muted);
      transition: var(--transition);
      position: relative;
    }
    .nav-btn:hover { background: var(--surface); color: var(--text); }
    .nav-btn.active { background: rgba(232,168,56,0.18); color: var(--gold); }
    .nav-btn .tooltip {
      position: absolute;
      left: 60px;
      background: var(--surface2);
      color: var(--text);
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 12px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      box-shadow: var(--shadow);
    }
    .nav-btn:hover .tooltip { opacity: 1; }

    /* ===== MAIN AREA ===== */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      background: var(--navy-mid);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(232,168,56,0.1);
      flex-shrink: 0;
    }
    .topbar-title { font-size: 18px; font-weight: 600; color: var(--text); }
    .topbar-title span { color: var(--gold); }
    .topbar-actions { display: flex; align-items: center; gap: 12px; }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary { background: var(--gold); color: var(--navy); }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); }
    .btn-ghost:hover { background: var(--surface); color: var(--text); }
    .btn-danger { background: var(--red); color: white; }
    .btn-danger:hover { background: #cc3333; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    .content { flex: 1; overflow-y: auto; padding: 24px; }
    .page { display: none; }
    .page.active { display: block; }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

    /* ===== CARDS ===== */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* ===== DASHBOARD ===== */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .kpi {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .kpi-icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .kpi-info { flex: 1; }
    .kpi-value { font-size: 28px; font-weight: 700; line-height: 1; }
    .kpi-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 768px) { .dash-grid { grid-template-columns: 1fr; } }

    .activity-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .activity-text { font-size: 13px; flex: 1; }
    .activity-time { font-size: 11px; color: var(--text-muted); }

    /* ===== CONTACTS ===== */
    .search-bar {
      width: 100%;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
      transition: var(--transition);
    }
    .search-bar:focus { border-color: var(--gold); }
    .search-bar::placeholder { color: var(--text-muted); }

    .contacts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .contact-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: var(--transition);
      cursor: pointer;
    }
    .contact-card:hover { border-color: rgba(232,168,56,0.3); transform: translateY(-2px); box-shadow: var(--shadow); }
    .contact-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }
    .contact-name { font-weight: 600; font-size: 15px; }
    .contact-company { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .contact-info { display: flex; flex-direction: column; gap: 5px; }
    .contact-info-row { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    .contact-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .tag {
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }
    .contact-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 14px; }

    /* ===== PIPELINE ===== */
    .pipeline-wrap { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px; min-height: 500px; }
    .pipeline-col {
      min-width: 240px;
      flex: 1;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
    }
    .pipeline-col-header {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .pipeline-col-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .pipeline-count {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
    }
    .pipeline-items { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 10px; min-height: 100px; }
    .prospect-card {
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      transition: var(--transition);
    }
    .prospect-card:hover { border-color: rgba(232,168,56,0.3); }
    .prospect-card-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .prospect-card-company { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
    .prospect-card-meta { display: flex; align-items: center; justify-content: space-between; }
    .prospect-amount { font-size: 13px; font-weight: 700; color: var(--gold); }
    .priority-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }

    /* ===== AGENDA ===== */
    .agenda-layout { display: grid; grid-template-columns: 1fr 320px; gap: 16px; }
    @media (max-width: 900px) { .agenda-layout { grid-template-columns: 1fr; } }

    .calendar { background: var(--surface); border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.06); padding: 20px; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .cal-title { font-size: 16px; font-weight: 700; }
    .cal-nav { display: flex; gap: 8px; }
    .cal-nav-btn {
      width: 32px; height: 32px;
      background: var(--surface2);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    .cal-nav-btn:hover { background: rgba(232,168,56,0.2); color: var(--gold); }
    .cal-grid-header { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 8px; }
    .cal-day-name { text-align: center; font-size: 11px; font-weight: 600; color: var(--text-muted); padding: 4px; text-transform: uppercase; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      border-radius: 8px;
      cursor: pointer;
      position: relative;
      transition: var(--transition);
    }
    .cal-cell:hover { background: var(--surface2); }
    .cal-cell.other-month { color: var(--text-muted); opacity: 0.4; }
    .cal-cell.today { background: rgba(232,168,56,0.2); color: var(--gold); font-weight: 700; }
    .cal-cell.selected { background: var(--gold); color: var(--navy); font-weight: 700; }
    .cal-cell.has-events::after {
      content: '';
      position: absolute;
      bottom: 4px;
      width: 4px; height: 4px;
      background: var(--gold);
      border-radius: 50%;
    }
    .cal-cell.selected.has-events::after { background: var(--navy); }

    .events-panel { background: var(--surface); border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.06); padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .events-panel-header { display: flex; align-items: center; justify-content: space-between; }
    .events-panel-date { font-size: 14px; font-weight: 700; }
    .event-item {
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 12px;
      border-left: 3px solid var(--gold);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .event-time { font-size: 12px; color: var(--gold); font-weight: 600; white-space: nowrap; min-width: 48px; }
    .event-body { flex: 1; }
    .event-title { font-size: 13px; font-weight: 600; }
    .event-contact { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .event-del { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 0; line-height: 1; }
    .event-del:hover { color: var(--red); }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--navy-mid);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 28px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-title { font-size: 18px; font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 22px; line-height: 1; padding: 0; }
    .modal-close:hover { color: var(--text); }

    /* ===== FORMS ===== */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: var(--transition);
      font-family: inherit;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold); }
    .form-textarea { min-height: 80px; resize: vertical; }
    .form-select option { background: var(--navy-mid); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-size: 14px;
      z-index: 9999;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error { border-left: 3px solid var(--red); }

    /* ===== COLORS ===== */
    .c-gold { color: var(--gold); }
    .c-green { color: var(--green); }
    .c-red { color: var(--red); }
    .c-blue { color: var(--blue); }
    .c-purple { color: var(--purple); }
    .bg-gold { background: rgba(232,168,56,0.18); }
    .bg-green { background: rgba(56,197,126,0.18); }
    .bg-red { background: rgba(232,85,85,0.18); }
    .bg-blue { background: rgba(74,158,255,0.18); }
    .bg-purple { background: rgba(168,85,247,0.18); }

    .stage-prospect { border-top: 3px solid var(--blue); }
    .stage-devis { border-top: 3px solid var(--gold); }
    .stage-nego { border-top: 3px solid var(--orange); }
    .stage-client { border-top: 3px solid var(--green); }
    .stage-perdu { border-top: 3px solid var(--red); }

    /* ===== DETAIL VIEW ===== */
    .detail-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 900;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      backdrop-filter: blur(4px);
    }
    .detail-overlay.hidden { display: none; }
    .detail-panel {
      background: var(--navy-mid);
      width: 400px;
      max-width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: 28px;
      border-left: 1px solid rgba(255,255,255,0.1);
      box-shadow: -10px 0 40px rgba(0,0,0,0.4);
    }
    .detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
    .detail-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 22px; }
    .detail-close:hover { color: var(--text); }
    .detail-avatar { width: 64px; height: 64px; border-radius: 50%; font-size: 24px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    .detail-name { font-size: 20px; font-weight: 700; }
    .detail-company { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
    .detail-section { margin-top: 20px; }
    .detail-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 10px; }
    .detail-row { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
    .detail-row:last-child { border-bottom: none; }
    .detail-row-label { color: var(--text-muted); min-width: 80px; flex-shrink: 0; }
    .detail-row-value { color: var(--text); word-break: break-word; }
    .detail-notes { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px; font-size: 13px; line-height: 1.6; color: var(--text-muted); min-height: 60px; }

    /* Responsive */
    @media (max-width: 600px) {
      .sidebar { width: 56px; }
      .sidebar-logo { width: 36px; height: 36px; font-size: 18px; }
      .content { padding: 14px; }
      .kpi-grid { grid-template-columns: 1fr 1fr; }
      .contacts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-logo">🏠</div>
    <button class="nav-btn active" data-page="dashboard" onclick="nav('dashboard')">
      📊
      <span class="tooltip">Tableau de bord</span>
    </button>
    <button class="nav-btn" data-page="contacts" onclick="nav('contacts')">
      👥
      <span class="tooltip">Contacts</span>
    </button>
    <button class="nav-btn" data-page="prospects" onclick="nav('prospects')">
      🎯
      <span class="tooltip">Prospects</span>
    </button>
    <button class="nav-btn" data-page="agenda" onclick="nav('agenda')">
      📅
      <span class="tooltip">Agenda</span>
    </button>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Esprit <span>d'Ouvertures</span> — CRM</div>
      <div class="topbar-actions">
        <button class="btn btn-primary" id="topAddBtn" onclick="topAdd()">+ Ajouter</button>
      </div>
    </div>
    <div class="content">

      <!-- ========== DASHBOARD ========== -->
      <div class="page active" id="page-dashboard">
        <div class="kpi-grid" id="kpiGrid"></div>
        <div class="dash-grid">
          <div class="card">
            <div class="card-header">
              <span class="card-title">Pipeline par étape</span>
            </div>
            <div id="pipelineSummary"></div>
          </div>
          <div class="card">
            <div class="card-header">
              <span class="card-title">Activité récente</span>
            </div>
            <div id="recentActivity"></div>
          </div>
          <div class="card">
            <div class="card-header">
              <span class="card-title">Prochains rendez-vous</span>
            </div>
            <div id="upcomingEvents"></div>
          </div>
          <div class="card">
            <div class="card-header">
              <span class="card-title">Top contacts</span>
            </div>
            <div id="topContacts"></div>
          </div>
        </div>
      </div>

      <!-- ========== CONTACTS ========== -->
      <div class="page" id="page-contacts">
        <input type="text" class="search-bar" id="contactSearch" placeholder="🔍 Rechercher un contact..." oninput="filterContacts()">
        <div class="contacts-grid" id="contactsGrid"></div>
      </div>

      <!-- ========== PROSPECTS ========== -->
      <div class="page" id="page-prospects">
        <div class="pipeline-wrap" id="pipelineWrap"></div>
      </div>

      <!-- ========== AGENDA ========== -->
      <div class="page" id="page-agenda">
        <div class="agenda-layout">
          <div class="calendar" id="calendarEl"></div>
          <div class="events-panel">
            <div class="events-panel-header">
              <span class="events-panel-date" id="selectedDateLabel">Aujourd'hui</span>
              <button class="btn btn-primary btn-sm" onclick="openEventModal()">+ RDV</button>
            </div>
            <div id="eventsList"></div>
          </div>
        </div>
      </div>

<script>
/* ========================================================
   DATA LAYER
======================================================== */
const DB = {
  get: (k, def = []) => { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
  log: (msg) => {
    const logs = DB.get('eo_logs', []);
    logs.unshift({ msg, ts: Date.now() });
    if (logs.length > 30) logs.pop();
    DB.set('eo_logs', logs);
  }
};

let contacts = DB.get('eo_contacts', []);
let prospects = DB.get('eo_prospects', []);
let events = DB.get('eo_events', []);

function save() {
  DB.set('eo_contacts', contacts);
  DB.set('eo_prospects', prospects);
  DB.set('eo_events', events);
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

/* ========================================================
   NAVIGATION
======================================================== */
let currentPage = 'dashboard';

function nav(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelector(`[data-page="${page}"]`).classList.add('active');
  currentPage = page;
  render[page]?.();
}

function topAdd() {
  if (currentPage === 'contacts') openContactModal();
  else if (currentPage === 'prospects') openProspectModal();
  else if (currentPage === 'agenda') openEventModal();
  else nav('contacts');
}

/* ========================================================
   AVATAR COLORS
======================================================== */
const COLORS = [
  ['#e8a838','#1a1a2e'], ['#4a9eff','#1a1a2e'], ['#38c57e','#1a1a2e'],
  ['#a855f7','#1a1a2e'], ['#ff8c42','#1a1a2e'], ['#e85555','white']
];
function avatarColor(name) {
  let h = 0;
  for (let c of name) h += c.charCodeAt(0);
  return COLORS[h % COLORS.length];
}
function initials(first, last) {
  return ((first?.[0] || '') + (last?.[0] || '')).toUpperCase() || '?';
}

/* ========================================================
   RENDER
======================================================== */
const render = {
  dashboard() {
    const today = new Date(); today.setHours(0,0,0,0);

    // KPIs
    const totalCA = prospects.filter(p => p.stage === 'client').reduce((s, p) => s + (+p.amount || 0), 0);
    const pipeline = prospects.filter(p => !['client','perdu'].includes(p.stage));
    const upcomingCount = events.filter(e => new Date(e.date) >= today).length;
    const kpis = [
      { icon: '👥', val: contacts.length, label: 'Contacts', bg: 'bg-blue', color: 'c-blue' },
      { icon: '🎯', val: pipeline.length, label: 'Prospects actifs', bg: 'bg-gold', color: 'c-gold' },
      { icon: '💶', val: totalCA.toLocaleString('fr-FR') + ' €', label: 'CA réalisé', bg: 'bg-green', color: 'c-green' },
      { icon: '📅', val: upcomingCount, label: 'RDV à venir', bg: 'bg-purple', color: 'c-purple' },
    ];
    document.getElementById('kpiGrid').innerHTML = kpis.map(k => `
      <div class="kpi">
        <div class="kpi-icon ${k.bg}">${k.icon}</div>
        <div class="kpi-info">
          <div class="kpi-value ${k.color}">${k.val}</div>
          <div class="kpi-label">${k.label}</div>
        </div>
      </div>`).join('');

    // Pipeline summary
    const stages = [
      { id: 'prospect', label: 'Prospect', color: 'var(--blue)' },
      { id: 'devis', label: 'Devis', color: 'var(--gold)' },
      { id: 'nego', label: 'Négociation', color: 'var(--orange)' },
      { id: 'client', label: 'Client', color: 'var(--green)' },
      { id: 'perdu', label: 'Perdu', color: 'var(--red)' },
    ];
    const max = Math.max(1, ...stages.map(s => prospects.filter(p => p.stage === s.id).length));
    document.getElementById('pipelineSummary').innerHTML = stages.map(s => {
      const cnt = prospects.filter(p => p.stage === s.id).length;
      const pct = Math.round(cnt / max * 100);
      return `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
          <span style="color:var(--text-muted)">${s.label}</span>
          <span style="color:${s.color};font-weight:600">${cnt}</span>
        </div>
        <div style="height:6px;background:rgba(255,255,255,0.07);border-radius:3px">
          <div style="height:6px;width:${pct}%;background:${s.color};border-radius:3px;transition:.4s"></div>
        </div>
      </div>`;
    }).join('');

    // Recent activity
    const logs = DB.get('eo_logs', []);
    document.getElementById('recentActivity').innerHTML = logs.length
      ? logs.slice(0,8).map(l => `
        <div class="activity-item">
          <div class="activity-dot" style="background:var(--gold)"></div>
          <div class="activity-text">${l.msg}</div>
          <div class="activity-time">${timeAgo(l.ts)}</div>
        </div>`).join('')
      : '<div class="empty-state"><div class="icon">📝</div><p>Aucune activité</p></div>';

    // Upcoming events
    const upcoming = events
      .filter(e => new Date(e.date + 'T00:00:00') >= today)
      .sort((a, b) => a.date.localeCompare(b.date))
      .slice(0, 5);
    document.getElementById('upcomingEvents').innerHTML = upcoming.length
      ? upcoming.map(e => {
          const c = contacts.find(c => c.id === e.contact);
          return `<div class="activity-item">
            <div class="activity-dot" style="background:var(--purple)"></div>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:600">${e.title}</div>
              <div style="font-size:11px;color:var(--text-muted)">${c ? c.first + ' ' + c.last : ''}</div>
            </div>
            <div class="activity-time">${formatDate(e.date)} ${e.time || ''}</div>
          </div>`;
        }).join('')
      : '<div class="empty-state"><div class="icon">📅</div><p>Aucun RDV à venir</p></div>';

    // Top contacts
    document.getElementById('topContacts').innerHTML = contacts.slice(0, 5).map(c => {
      const [bg, fg] = avatarColor(c.first + c.last);
      return `<div class="activity-item" style="cursor:pointer" onclick="showContactDetail('${c.id}')">
        <div class="avatar" style="background:${bg};color:${fg};width:32px;height:32px;font-size:13px">
          ${initials(c.first, c.last)}
        </div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">${c.first} ${c.last}</div>
          <div style="font-size:11px;color:var(--text-muted)">${c.company || c.category}</div>
        </div>
      </div>`;
    }).join('') || '<div class="empty-state"><div class="icon">👥</div><p>Aucun contact</p></div>';
  },

  contacts() {
    filterContacts();
  },

  prospects() {
    renderPipeline();
  },

  agenda() {
    renderCalendar();
    renderEvents();
  }
};

/* ========================================================
   CONTACTS
======================================================== */
function filterContacts() {
  const q = (document.getElementById('contactSearch')?.value || '').toLowerCase();
  const filtered = contacts.filter(c =>
    (c.first + ' ' + c.last + ' ' + c.company + ' ' + c.email).toLowerCase().includes(q)
  );
  const catColors = {
    client: ['var(--green)', 'bg-green'],
    prospect: ['var(--gold)', 'bg-gold'],
    partenaire: ['var(--blue)', 'bg-blue'],
    fournisseur: ['var(--purple)', 'bg-purple'],
  };
  document.getElementById('contactsGrid').innerHTML = filtered.length
    ? filtered.map(c => {
        const [bg, fg] = avatarColor(c.first + c.last);
        const [catColor, catBg] = catColors[c.category] || [catColors.client[0], catColors.client[1]];
        return `<div class="contact-card" onclick="showContactDetail('${c.id}')">
          <div class="contact-header">
            <div class="avatar" style="background:${bg};color:${fg}">${initials(c.first, c.last)}</div>
            <div>
              <div class="contact-name">${c.first} ${c.last}</div>
              <div class="contact-company">${c.company || '—'}</div>
            </div>
          </div>
          <div class="contact-info">
            ${c.email ? `<div class="contact-info-row">✉️ ${c.email}</div>` : ''}
            ${c.phone ? `<div class="contact-info-row">📞 ${c.phone}</div>` : ''}
          </div>
          <div class="contact-tags">
            <span class="tag ${catBg}" style="color:${catColor}">${c.category}</span>
          </div>
          <div class="contact-actions" onclick="event.stopPropagation()">
            <button class="btn btn-ghost btn-sm" onclick="openContactModal('${c.id}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteContact('${c.id}')">🗑</button>
          </div>
        </div>`;
      }).join('')
    : `<div class="empty-state" style="grid-column:1/-1">
        <div class="icon">👥</div>
        <p>${contacts.length === 0 ? 'Aucun contact — cliquez sur "+ Ajouter"' : 'Aucun résultat'}</p>
       </div>`;
}

function openContactModal(id = null) {
  const modal = document.getElementById('contactModal');
  const form = document.getElementById('contactForm');
  form.reset();
  document.getElementById('cId').value = '';
  document.getElementById('contactModalTitle').textContent = 'Nouveau contact';

  if (id) {
    const c = contacts.find(c => c.id === id);
    if (!c) return;
    document.getElementById('contactModalTitle').textContent = 'Modifier le contact';
    document.getElementById('cId').value = c.id;
    document.getElementById('cFirst').value = c.first;
    document.getElementById('cLast').value = c.last;
    document.getElementById('cCompany').value = c.company || '';
    document.getElementById('cEmail').value = c.email || '';
    document.getElementById('cPhone').value = c.phone || '';
    document.getElementById('cCategory').value = c.category;
    document.getElementById('cNotes').value = c.notes || '';
  }
  modal.classList.remove('hidden');
}

document.getElementById('contactForm').onsubmit = function(e) {
  e.preventDefault();
  const id = document.getElementById('cId').value;
  const data = {
    id: id || uid(),
    first: document.getElementById('cFirst').value.trim(),
    last: document.getElementById('cLast').value.trim(),
    company: document.getElementById('cCompany').value.trim(),
    email: document.getElementById('cEmail').value.trim(),
    phone: document.getElementById('cPhone').value.trim(),
    category: document.getElementById('cCategory').value,
    notes: document.getElementById('cNotes').value.trim(),
    created: id ? (contacts.find(c => c.id === id)?.created || Date.now()) : Date.now()
  };
  if (id) {
    const i = contacts.findIndex(c => c.id === id);
    contacts[i] = data;
    DB.log(`Contact modifié : ${data.first} ${data.last}`);
    toast('Contact mis à jour', 'success');
  } else {
    contacts.unshift(data);
    DB.log(`Nouveau contact : ${data.first} ${data.last}`);
    toast('Contact ajouté', 'success');
  }
  save();
  closeModal('contactModal');
  filterContacts();
  render.dashboard();
};

function deleteContact(id) {
  const c = contacts.find(c => c.id === id);
  if (!confirm(`Supprimer ${c.first} ${c.last} ?`)) return;
  contacts = contacts.filter(c => c.id !== id);
  DB.log(`Contact supprimé : ${c.first} ${c.last}`);
  save();
  filterContacts();
  toast('Contact supprimé', 'success');
}

function showContactDetail(id) {
  const c = contacts.find(c => c.id === id);
  if (!c) return;
  const [bg, fg] = avatarColor(c.first + c.last);
  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-header">
      <div></div>
      <button class="detail-close" onclick="closeDetail()">×</button>
    </div>
    <div class="detail-avatar" style="background:${bg};color:${fg}">${initials(c.first, c.last)}</div>
    <div class="detail-name">${c.first} ${c.last}</div>
    <div class="detail-company">${c.company || ''}</div>
    <div class="detail-section">
      <div class="detail-section-title">Coordonnées</div>
      ${c.email ? `<div class="detail-row"><span class="detail-row-label">Email</span><span class="detail-row-value">${c.email}</span></div>` : ''}
      ${c.phone ? `<div class="detail-row"><span class="detail-row-label">Tél.</span><span class="detail-row-value">${c.phone}</span></div>` : ''}
      <div class="detail-row"><span class="detail-row-label">Catégorie</span><span class="detail-row-value">${c.category}</span></div>
      <div class="detail-row"><span class="detail-row-label">Ajouté</span><span class="detail-row-value">${new Date(c.created).toLocaleDateString('fr-FR')}</span></div>
    </div>
    ${c.notes ? `<div class="detail-section">
      <div class="detail-section-title">Notes</div>
      <div class="detail-notes">${c.notes}</div>
    </div>` : ''}
    <div style="display:flex;gap:10px;margin-top:24px">
      <button class="btn btn-primary" style="flex:1" onclick="openContactModal('${c.id}');closeDetail()">✏️ Modifier</button>
      <button class="btn btn-danger" onclick="deleteContact('${c.id}');closeDetail()">🗑</button>
    </div>`;
  document.getElementById('detailOverlay').classList.remove('hidden');
}

/* ========================================================
   PROSPECTS / PIPELINE
======================================================== */
const STAGES = [
  { id: 'prospect', label: 'Prospect', color: 'var(--blue)' },
  { id: 'devis', label: 'Devis', color: 'var(--gold)' },
  { id: 'nego', label: 'Négociation', color: 'var(--orange)' },
  { id: 'client', label: 'Client', color: 'var(--green)' },
  { id: 'perdu', label: 'Perdu', color: 'var(--red)' },
];

function renderPipeline() {
  const prioColors = { haute: ['var(--red)', 'bg-red'], moyenne: ['var(--gold)', 'bg-gold'], basse: ['var(--green)', 'bg-green'] };
  document.getElementById('pipelineWrap').innerHTML = STAGES.map(s => {
    const items = prospects.filter(p => p.stage === s.id);
    return `<div class="pipeline-col stage-${s.id}">
      <div class="pipeline-col-header">
        <span class="pipeline-col-name" style="color:${s.color}">${s.label}</span>
        <span class="pipeline-count">${items.length}</span>
      </div>
      <div class="pipeline-items">
        ${items.length ? items.map(p => {
          const [pc, pb] = prioColors[p.priority] || prioColors.moyenne;
          return `<div class="prospect-card" onclick="showProspectDetail('${p.id}')">
            <div class="prospect-card-name">${p.name}</div>
            <div class="prospect-card-company">${p.company || '—'}</div>
            <div class="prospect-card-meta">
              <span class="prospect-amount">${p.amount ? (+p.amount).toLocaleString('fr-FR') + ' €' : '—'}</span>
              <span class="priority-badge ${pb}" style="color:${pc}">${p.priority}</span>
            </div>
            <div style="display:flex;gap:6px;margin-top:8px;justify-content:flex-end" onclick="event.stopPropagation()">
              <button class="btn btn-ghost btn-sm" onclick="openProspectModal('${p.id}')">✏️</button>
              <button class="btn btn-danger btn-sm" onclick="deleteProspect('${p.id}')">🗑</button>
            </div>
          </div>`;
        }).join('') : `<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:12px">Vide</div>`}
      </div>
    </div>`;
  }).join('');
}

function openProspectModal(id = null) {
  const form = document.getElementById('prospectForm');
  form.reset();
  document.getElementById('pId').value = '';
  document.getElementById('prospectModalTitle').textContent = 'Nouveau prospect';
  if (id) {
    const p = prospects.find(p => p.id === id);
    if (!p) return;
    document.getElementById('prospectModalTitle').textContent = 'Modifier le prospect';
    document.getElementById('pId').value = p.id;
    document.getElementById('pName').value = p.name;
    document.getElementById('pCompany').value = p.company || '';
    document.getElementById('pAmount').value = p.amount || '';
    document.getElementById('pPriority').value = p.priority;
    document.getElementById('pStage').value = p.stage;
    document.getElementById('pNotes').value = p.notes || '';
  }
  document.getElementById('prospectModal').classList.remove('hidden');
}

document.getElementById('prospectForm').onsubmit = function(e) {
  e.preventDefault();
  const id = document.getElementById('pId').value;
  const data = {
    id: id || uid(),
    name: document.getElementById('pName').value.trim(),
    company: document.getElementById('pCompany').value.trim(),
    amount: document.getElementById('pAmount').value,
    priority: document.getElementById('pPriority').value,
    stage: document.getElementById('pStage').value,
    notes: document.getElementById('pNotes').value.trim(),
  };
  if (id) {
    const i = prospects.findIndex(p => p.id === id);
    prospects[i] = data;
    DB.log(`Prospect modifié : ${data.name}`);
    toast('Prospect mis à jour', 'success');
  } else {
    prospects.unshift(data);
    DB.log(`Nouveau prospect : ${data.name}`);
    toast('Prospect ajouté', 'success');
  }
  save();
  closeModal('prospectModal');
  renderPipeline();
  render.dashboard();
};

function deleteProspect(id) {
  const p = prospects.find(p => p.id === id);
  if (!confirm(`Supprimer ${p.name} ?`)) return;
  prospects = prospects.filter(p => p.id !== id);
  DB.log(`Prospect supprimé : ${p.name}`);
  save();
  renderPipeline();
  toast('Prospect supprimé', 'success');
}

function showProspectDetail(id) {
  const p = prospects.find(p => p.id === id);
  if (!p) return;
  const stage = STAGES.find(s => s.id === p.stage);
  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-header">
      <div></div>
      <button class="detail-close" onclick="closeDetail()">×</button>
    </div>
    <div style="font-size:32px;margin-bottom:12px">🎯</div>
    <div class="detail-name">${p.name}</div>
    <div class="detail-company">${p.company || ''}</div>
    <div class="detail-section">
      <div class="detail-section-title">Détails</div>
      <div class="detail-row"><span class="detail-row-label">Étape</span><span class="detail-row-value" style="color:${stage?.color}">${stage?.label || p.stage}</span></div>
      <div class="detail-row"><span class="detail-row-label">Montant</span><span class="detail-row-value c-gold">${p.amount ? (+p.amount).toLocaleString('fr-FR') + ' €' : '—'}</span></div>
      <div class="detail-row"><span class="detail-row-label">Priorité</span><span class="detail-row-value">${p.priority}</span></div>
    </div>
    ${p.notes ? `<div class="detail-section"><div class="detail-section-title">Notes</div><div class="detail-notes">${p.notes}</div></div>` : ''}
    <div style="display:flex;gap:10px;margin-top:24px">
      <button class="btn btn-primary" style="flex:1" onclick="openProspectModal('${p.id}');closeDetail()">✏️ Modifier</button>
      <button class="btn btn-danger" onclick="deleteProspect('${p.id}');closeDetail()">🗑</button>
    </div>`;
  document.getElementById('detailOverlay').classList.remove('hidden');
}

/* ========================================================
   AGENDA
======================================================== */
let calDate = new Date();
let selectedDate = new Date();

function formatDate(d) {
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function renderCalendar() {
  const year = calDate.getFullYear();
  const month = calDate.getMonth();
  const today = new Date(); today.setHours(0,0,0,0);
  const sel = selectedDate.toISOString().slice(0,10);

  const months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const days = ['L','M','M','J','V','S','D'];

  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  let startDay = (first.getDay() + 6) % 7;

  let cells = '';
  for (let i = 0; i < startDay; i++) {
    const d = new Date(year, month, 1 - startDay + i);
    cells += `<div class="cal-cell other-month">${d.getDate()}</div>`;
  }
  for (let d = 1; d <= last.getDate(); d++) {
    const dt = new Date(year, month, d);
    const iso = dt.toISOString().slice(0,10);
    const isToday = dt.getTime() === today.getTime();
    const isSel = iso === sel;
    const hasEv = events.some(e => e.date === iso);
    cells += `<div class="cal-cell${isToday?' today':''}${isSel?' selected':''}${hasEv?' has-events':''}"
      onclick="selectDate('${iso}')">${d}</div>`;
  }
  const rem = (7 - ((startDay + last.getDate()) % 7)) % 7;
  for (let i = 1; i <= rem; i++) {
    cells += `<div class="cal-cell other-month">${i}</div>`;
  }

  document.getElementById('calendarEl').innerHTML = `
    <div class="cal-header">
      <div class="cal-title">${months[month]} ${year}</div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="shiftMonth(-1)">‹</button>
        <button class="cal-nav-btn" onclick="shiftMonth(1)">›</button>
      </div>
    </div>
    <div class="cal-grid-header">${days.map(d => `<div class="cal-day-name">${d}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>`;
}

function shiftMonth(n) {
  calDate = new Date(calDate.getFullYear(), calDate.getMonth() + n, 1);
  renderCalendar();
}

function selectDate(iso) {
  selectedDate = new Date(iso + 'T00:00:00');
  renderCalendar();
  renderEvents();
}

function renderEvents() {
  const iso = selectedDate.toISOString().slice(0,10);
  const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  document.getElementById('selectedDateLabel').textContent =
    `${selectedDate.getDate()} ${months[selectedDate.getMonth()]} ${selectedDate.getFullYear()}`;

  const dayEvents = events.filter(e => e.date === iso)
    .sort((a, b) => (a.time || '').localeCompare(b.time || ''));

  document.getElementById('eventsList').innerHTML = dayEvents.length
    ? dayEvents.map(e => {
        const c = contacts.find(c => c.id === e.contact);
        return `<div class="event-item">
          <div class="event-time">${e.time || '—'}</div>
          <div class="event-body">
            <div class="event-title">${e.title}</div>
            ${c ? `<div class="event-contact">👤 ${c.first} ${c.last}</div>` : ''}
            ${e.notes ? `<div class="event-contact">📝 ${e.notes}</div>` : ''}
          </div>
          <button class="event-del" onclick="deleteEvent('${e.id}')">×</button>
        </div>`;
      }).join('')
    : `<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px">Aucun rendez-vous</div>`;
}

function openEventModal() {
  const form = document.getElementById('eventForm');
  form.reset();
  const iso = selectedDate.toISOString().slice(0,10);
  document.getElementById('evDate').value = iso;
  // Populate contacts
  const sel = document.getElementById('evContact');
  sel.innerHTML = '<option value="">— Aucun —</option>' +
    contacts.map(c => `<option value="${c.id}">${c.first} ${c.last}${c.company ? ' ('+c.company+')' : ''}</option>`).join('');
  document.getElementById('eventModal').classList.remove('hidden');
}

document.getElementById('eventForm').onsubmit = function(e) {
  e.preventDefault();
  const data = {
    id: uid(),
    title: document.getElementById('evTitle').value.trim(),
    date: document.getElementById('evDate').value,
    time: document.getElementById('evTime').value,
    contact: document.getElementById('evContact').value,
    notes: document.getElementById('evNotes').value.trim(),
  };
  events.push(data);
  DB.log(`Nouveau RDV : ${data.title} (${formatDate(data.date)})`);
  save();
  closeModal('eventModal');
  renderCalendar();
  renderEvents();
  toast('Rendez-vous ajouté', 'success');
};

function deleteEvent(id) {
  const ev = events.find(e => e.id === id);
  if (!confirm(`Supprimer "${ev?.title}" ?`)) return;
  events = events.filter(e => e.id !== id);
  DB.log(`RDV supprimé : ${ev?.title}`);
  save();
  renderCalendar();
  renderEvents();
  toast('Rendez-vous supprimé', 'success');
}

/* ========================================================
   MODAL / DETAIL
======================================================== */
function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
}
function closeDetail(e) {
  if (!e || e.target.classList.contains('detail-overlay')) {
    document.getElementById('detailOverlay').classList.add('hidden');
  }
}

/* ========================================================
   TOAST
======================================================== */
let toastTimer;
function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

/* ========================================================
   UTILS
======================================================== */
function timeAgo(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return 'À l\'instant';
  if (diff < 3600000) return Math.floor(diff/60000) + ' min';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h';
  return Math.floor(diff/86400000) + 'j';
}

/* ========================================================
   PWA SERVICE WORKER
======================================================== */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(console.error);
}

/* ========================================================
   INIT
======================================================== */
render.dashboard();
</script>
